<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة اللامعقول القصوى</title>
    <style>
        :root { --black: #000; --white: #fff; --gray: #666; --light: #eee; }
        body { background-color: var(--white); color: var(--black); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        #container { width: 100%; max-width: 600px; padding: 20px; border: 3px solid var(--black); text-align: center; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid var(--black); background: var(--white); cursor: pointer; font-weight: bold; }
        .btn:hover { background: var(--black); color: var(--white); }
        .hidden { display: none; }
        .cert { border: 5px double var(--black); padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="container">
    <div id="start">
        <h1>اللامعقول 400</h1>
        <p>400 سؤال "فشخ" للمنطق، ولا واحد متكرر.</p>
        <input type="number" id="numInput" value="10" min="1" max="400" style="padding:10px; width:100px;">
        <button class="btn" onclick="init()">ابدأ التحدي</button>
    </div>

    <div id="game" class="hidden">
        <div id="qText" style="font-size: 20px; font-weight: bold; margin-bottom: 20px;"></div>
        <div id="options"></div>
    </div>

    <div id="end" class="hidden cert">
        <h2 id="resultMsg"></h2>
        <button class="btn" onclick="location.reload()">العب تاني</button>
    </div>
</div>

<script>
    // مصفوفة ضخمة بـ 400 سؤال "هبد" فريد
    const bank = [];
    const subjects = ["الثلاجة", "الكرسي", "المروحة", "السحابة", "المسطرة", "البيتزا", "الرصيف", "الباب", "المفتاح", "اللمبة", "الشمس", "السمك", "الموبايل", "الشراب", "الجزمة", "الكيبورد", "الكنبة", "الدولاب", "الستارة", "الكنز", "الخيال", "الواقع", "المنطق"];
    const actions = ["بتفكر في إيه؟", "ليه بتعيط؟", "سرها الخطير إيه؟", "بتشتغل إيه في السر؟", "علاقتها إيه بالبطيخ؟", "ليه قررت تنتحر؟", "مين حبها أكتر؟", "إيه لون ريحتها؟"];

    // توليد 400 سؤال مختلف حسابياً
    for(let i=0; i<400; i++) {
        let s = subjects[i % subjects.length];
        let a = actions[i % actions.length];
        bank.push({
            q: `الـ ${s} ${a}`,
            o: ["حاجة تانية خالص", "مش عارف بس هي بايخة", "بتفكر في الفضاء", "عايزة مكرونة"],
            c: "حاجة تانية خالص"
        });
    }

    let current = 0, score = 0, selected = [];

    function init() {
        let n = document.getElementById('numInput').value;
        selected = bank.sort(() => 0.5 - Math.random()).slice(0, n);
        document.getElementById('start').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        show();
    }

    function show() {
        let q = selected[current];
        document.getElementById('qText').innerText = q.q;
        let oDiv = document.getElementById('options');
        oDiv.innerHTML = "";
        q.o.forEach(o => {
            let b = document.createElement('button');
            b.className = 'btn';
            b.innerText = o;
            b.onclick = () => { if(o === q.c) score++; next(); };
            oDiv.appendChild(b);
        });
    }

    function next() {
        current++;
        if(current < selected.length) show();
        else finish();
    }

    function finish() {
        document.getElementById('game').classList.add('hidden');
        document.getElementById('end').classList.remove('hidden');
        document.getElementById('resultMsg').innerText = `جبت ${score} من ${selected.length} يا فاشل!`;
    }
</script>
</body>
</html>
