<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة اللامعقول - 400 سؤال</title>
    <style>
        /* إعدادات عامة وألوان الأبيض والأسود الكلاسيكية */
        :root {
            --black: #000000;
            --dark-gray: #222222;
            --gray: #666666;
            --light-gray: #e0e0e0;
            --off-white: #f8f9fa;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--off-white);
            color: var(--black);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        #game-container {
            background-color: var(--white);
            width: 100%;
            max-width: 650px;
            padding: 35px 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 2px solid var(--black);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: clamp(26px, 6vw, 34px);
            margin-bottom: 10px;
            font-weight: 900;
            color: var(--black);
            line-height: 1.4;
        }

        p.subtitle {
            color: var(--gray);
            font-size: clamp(14px, 3.5vw, 16px);
            margin-bottom: 30px;
            line-height: 1.5;
            font-weight: 600;
        }

        /* ==== شاشة البداية (اختيار العدد) ==== */
        .num-btns-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .num-btn {
            background-color: var(--white);
            border: 2px solid var(--black);
            padding: 14px 22px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--black);
        }

        .num-btn:hover {
            background-color: var(--black);
            color: var(--white);
        }

        .custom-input {
            width: 100%;
            max-width: 220px;
            padding: 14px;
            border: 2px solid var(--gray);
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border 0.3s;
            font-family: inherit;
            color: var(--black);
            font-weight: bold;
        }

        .custom-input:focus {
            border-color: var(--black);
        }

        /* شريط التقدم */
        #progress-container {
            width: 100%;
            background-color: var(--light-gray);
            height: 8px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        #progress-bar {
            height: 100%;
            background-color: var(--black);
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        #question-counter {
            font-size: 15px;
            color: var(--gray);
            margin-bottom: 20px;
            font-weight: bold;
        }

        #question {
            font-size: clamp(20px, 5vw, 26px);
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.7;
            color: var(--black);
            word-wrap: break-word;
        }

        /* أزرار الاختيارات */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .mcq-btn {
            background-color: var(--white);
            color: var(--black);
            border: 2px solid var(--light-gray);
            padding: 18px 20px;
            font-size: clamp(16px, 4vw, 18px);
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
            width: 100%;
            white-space: normal; 
            line-height: 1.5; 
            word-break: break-word;
        }

        .mcq-btn:hover {
            border-color: var(--black);
            background-color: var(--off-white);
            transform: translateY(-2px);
        }

        .mcq-btn:active {
            transform: translateY(0);
            background-color: var(--light-gray);
        }

        /* زر الأساسي */
        .primary-btn {
            background-color: var(--black);
            color: var(--white);
            border: 2px solid var(--black);
            padding: 16px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 25px;
            width: 100%;
            transition: all 0.2s ease;
        }

        .primary-btn:hover {
            background-color: var(--white);
            color: var(--black);
        }

        /* الحركات الانتقالية */
        .fade-in-up {
            animation: fadeInUp 0.4s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }

        /* شاشة نتيجة السؤال */
        #result-text {
            font-size: clamp(24px, 5vw, 30px);
            font-weight: 900;
            margin-bottom: 15px;
            color: var(--black);
        }

        #correct-answer {
            font-size: clamp(18px, 4vw, 22px);
            color: var(--dark-gray);
            margin-bottom: 25px;
            padding: 20px;
            background-color: var(--off-white);
            border-radius: 10px;
            border: 2px dashed var(--gray);
            line-height: 1.6;
        }

        /* ====== تصميم الشهادة ====== */
        .certificate-box {
            background-color: var(--white);
            padding: 30px 15px;
            border-radius: 8px;
            position: relative;
            margin-top: 10px;
        }

        .certificate-box.passed { border: 6px double var(--black); }
        .certificate-box.failed { border: 6px dashed var(--gray); background-color: var(--off-white); }

        .cert-title {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 900;
            margin-bottom: 10px;
            color: var(--black);
        }

        .cert-subtitle {
            font-size: clamp(14px, 3.5vw, 16px);
            color: var(--gray);
            margin-bottom: 20px;
            font-weight: bold;
            line-height: 1.6;
        }

        .score-fraction {
            font-size: clamp(40px, 10vw, 55px);
            font-weight: 900;
            color: var(--black);
            margin: 15px 0;
            direction: ltr;
            display: inline-block;
            background: var(--white);
            padding: 10px 25px;
            border: 3px solid var(--black);
            border-radius: 10px;
        }

        .certificate-box.failed .score-fraction { 
            color: var(--gray); 
            border-color: var(--gray); 
        }

        .score-comment {
            font-size: clamp(18px, 4vw, 22px);
            font-weight: bold;
            margin-bottom: 30px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--black);
            background-color: var(--off-white);
            color: var(--black);
            line-height: 1.6;
        }

        .stamp {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 80px;
            height: 80px;
            border: 3px solid var(--black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: clamp(14px, 3.5vw, 16px);
            transform: rotate(-15deg);
            background-color: rgba(255,255,255,0.95);
            color: var(--black);
        }

        .certificate-box.failed .stamp { border-style: dashed; }

        @media (max-width: 480px) {
            #game-container { padding: 25px 15px; }
            .primary-btn { padding: 14px 20px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="start-area" class="fade-in-up">
            <h1>لعبة اللامعقول 🏁</h1>
            <p class="subtitle">بدون أي تكرار! معانا 400 سؤال فريد من نوعه وكلها أسئلة سريعة وخفيفة جداً.</p>
            
            <div class="num-btns-container">
                <button class="num-btn" onclick="setCustomNum(10)">10 أسئلة</button>
                <button class="num-btn" onclick="setCustomNum(50)">50 سؤال</button>
                <button class="num-btn" onclick="setCustomNum(100)">100 سؤال</button>
            </div>
            
            <div style="margin-bottom: 20px;">
                <input type="number" id="custom-num" class="custom-input" placeholder="أو اكتب رقم بمزاجك" min="1" max="400">
            </div>

            <button class="primary-btn" onclick="startSetup()">ابدأ الامتحان</button>
        </div>

        <div id="header-area" class="hidden">
            <h1>اللامعقول</h1>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="question-counter"></div>
        </div>
        
        <div id="question-area" class="hidden">
            <div id="question">جاري التحميل...</div>
            <div id="options-container" class="options-container"></div>
        </div>

        <div id="result-area" class="hidden">
            <div id="result-text"></div>
            <div id="correct-answer"></div>
            <button class="primary-btn" onclick="nextQuestion()">السؤال التالي</button>
        </div>

        <div id="final-area" class="hidden">
            <div id="cert-box" class="certificate-box">
                <div class="cert-title" id="cert-title-text">شهادة إتمام الهبد 📜</div>
                <div class="cert-subtitle">تشهد وزارة اللامعقول بأن اللاعب قد أنهى الاختبار وحصل على:</div>
                
                <div class="score-fraction" id="final-fraction">0 / 0</div>
                
                <div class="score-comment" id="score-comment">جاري التقييم...</div>
                
                <div class="stamp" id="cert-stamp">مُعتمد</div>
            </div>
            <button class="primary-btn" onclick="location.reload()" style="margin-top: 15px;">امتحن تاني</button>
        </div>
    </div>

    <script>
        // خوارزمية لخبطة المصفوفات بشكل عشوائي 100%
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // ===============================================
        // إنشاء قاعدة بيانات من الأسئلة القصيرة المباشرة (جمع - مفرد - مضاد) 
        // وتوليد 1200 إجابة عبثية ولا إجابة فيهم متكررة 
        // ===============================================
        
        // 1. الكلمات الأساسية لـ تكوين السؤال البسيط المباشر (150 كلمة أساسية)
        const baseWords = [
            "كرسي", "شجرة", "طريق", "بطاطس", "كتاب", "عجلة", "شنطة", "مروحة", "قطر", "كوباية",
            "طبق", "شمس", "قمر", "أسد", "فيل", "كيس", "غسالة", "قلم", "بحيرة", "لمبة",
            "توك توك", "مسمار", "خاتم", "ساعة", "نضارة", "سبورة", "صواريخ", "جزيرة", "حجر", "كشاف",
            "طيارة", "راديو", "عظمة", "تفاح", "موز", "برتقال", "حائط", "سجادة", "شوكولاتة", "خيار",
            "تليفزيون", "فلاشة", "سرير", "كنبة", "نجمة", "صخرة", "شبشب", "مكتب", "ثلاجة", "وردة",
            "فرح", "سحابة", "بنطلون", "قفل", "مفتاح", "صاروخ", "سلك", "تكييف", "قميص", "جاكيت",
            "شوكة", "حمام", "ملعقة", "مسرح", "مطعم", "حلة", "برميل", "عربيه", "عسكري", "عفريت",
            "بحر", "بطة", "سمكة", "بلياتشو", "غواصة", "بصل", "توم", "زرع", "شاورما", "كبدة",
            "دكان", "فراولة", "ليمون", "ريسيفر", "بطانية", "سكة الحديد", "لوحة", "مدرسة", "سهم", "نفق",
            "صوت", "بسكويت", "مطرقة", "رصيف", "زيتون", "شارع", "جبنة", "فانوس", "خزان", "شرشوبة",
            "رمل", "كعب", "ضرس", "فرن", "ورقة", "قطار", "قفص", "شوال", "كراتين", "بطيخ",
            "باب", "سطح", "جريدة", "مجلة", "تذكرة", "رسالة", "قناع", "حصان", "كلب", "عنكبوت",
            "دكتور", "حلاوة", "عيش", "كابل", "زرار", "بطارية", "مناديل", "أستيكة", "مسطرة", "دفتر",
            "أستاذ", "طيور", "نعامة", "أسلاك", "طين", "جزمة", "كبشة", "غفير", "سلطعون", "قنديل"
        ];

        // الأسئلة ستأتي بـ 3 أنواع فقط: "جمع"، "مفرد"، "مضاد" وبشكل مختصر
        let allQuestionsTexts = [];
        for (let w of baseWords) {
            allQuestionsTexts.push(`ما هو جمع كلمة "${w}"؟`);
            allQuestionsTexts.push(`ما هو مفرد كلمة "${w}"؟`);
            allQuestionsTexts.push(`إيه هو مضاد كلمة "${w}"؟`);
        }
        
        // خلط قائمة الأسئلة الـ 450 سؤال و اختيار 400 فقط منها ليضمن تنوع 100%
        let final400Questions = shuffleArray(allQuestionsTexts).slice(0, 400);

        // 2. الكلمات اللي هتصنع الـ 1200 إجابة قصيرة ومجنونة 
        // كلمة + صفة (أو العكس) لخلق تشكيلات خرافية مستحيل تخلص (حوالي 4200 احتمال).
        const nNonsense = [
            "خلاط", "راوتر", "فيل", "كابل", "صاروخ", "باذنجان", "دبابة", "قلقاس", "نملة", "جرجير",
            "صينية", "توك توك", "ديناصور", "فول", "قرد", "دولاب", "عكاز", "كوباية", "زرافة", "شبشب",
            "سلك", "فرشة", "منشة", "استيكة", "سبورة", "غواصة", "مكواة", "ريموت", "نضارة", "حلة",
            "براية", "مقلمة", "ببرونة", "مرتبة", "بوتاجاز", "سحلب", "عرقسوس", "بطريق", "ضفدع", "دبانة",
            "بصل", "حبال", "مكعب", "راديو", "شريط", "اسطوانة", "مضرب", "عصاية", "خرطوم", "بنسة",
            "شاكوش", "صاروخ", "صاروخ أرضي", "غسالة", "بطيخة", "برطمان", "دش", "مسامير", "خفاش", "سلحفاة"
        ]; // 60 أسم عجيب

        const adjNonsense = [
            "مقلي", "مشوي", "بيطير", "مكسور", "حزين", "شفاف", "ملون", "تايه", "دايخ", "فضائي",
            "كئيب", "بيضحك", "منقط", "متكهرب", "لزق", "نايم", "عطلان", "أقرع", "سريع", "بيبرق",
            "نص سوا", "عطشان", "مهنج", "بيغني", "متجمد", "سخن", "معصب", "مبلول", "مشع", "مزعج",
            "فرحان", "مخطط", "منقرض", "زعلان", "مكرمش", "مجفف", "سحري", "جبار", "جعان", "فرافيت",
            "لابس نضارة", "تايه فالمسافة", "عامل دايت", "سهران", "عاطل", "مطاطي", "متوتر", "مرعوب", "بدون سكر", "سايح",
            "غريب", "مستخبي", "قصير", "خجول", "مصدوم", "عبقري", "صامت", "بيعيط", "شجاع", "معطوب"
        ]; // 60 صفة مضحكة ومجنونة

        // نقوم بعملية الدمج ليطلع لنا حوالي 3600 اختيار عبارة عن كلمتين!
        let massiveAnswerBank = [];
        for (let n of nNonsense) {
            for (let a of adjNonsense) {
                massiveAnswerBank.push(`${n} ${a}`);
            }
        }

        // نقوم بخربطة الإجابات واقتطاع 1200 إجابة عشوائية مش هتتكرر أبداااا!
        massiveAnswerBank = shuffleArray(massiveAnswerBank).slice(0, 1200);

        // نقوم بتقسيم هذه الاختيارات على الأسئلة بحيث كل سؤال ليه الـ 3 إجابات بتاعته الخاصة به
        let fullDatabase = [];
        for (let i = 0; i < 400; i++) {
            let choice1 = massiveAnswerBank[i * 3];       // اختيار 1
            let choice2 = massiveAnswerBank[(i * 3) + 1]; // اختيار 2
            let choice3 = massiveAnswerBank[(i * 3) + 2]; // اختيار 3

            let optionsRaw = [choice1, choice2, choice3];
            let qShuffledOpts = shuffleArray([...optionsRaw]);

            fullDatabase.push({
                q: final400Questions[i],     // سطر بسيط: إيه مضاد\جمع..
                options: qShuffledOpts,      // ٣ كلمات مجنونة بدون تكرار
                a: choice1                   // واحدة فيهم الصح وهما كدا كدا 100% مختلفين
            });
        }


        // =========== منطق التحكم في اللعبة والتصميم الثابت كما طلبت تماما ===========
        let selectedQuestions = [];
        let currentIndex = 0;
        let correctAnswersCount = 0;

        function setCustomNum(num) {
            document.getElementById('custom-num').value = num;
        }

        function startSetup() {
            let inputVal = document.getElementById('custom-num').value;
            let num = parseInt(inputVal);
            
            if (isNaN(num) || num <= 0) {
                alert("اكتب رقم صحيح للأسئلة يا بطل!");
                return;
            }
            if (num > 400) {
                alert("أقصى عدد للأسئلة هو 400 سؤال بس!");
                num = 400;
            }

            // اللخبطة الاحترافية لقاعدة الأسئلة الفريدة 
            let shuffledDatabase = shuffleArray([...fullDatabase]);
            selectedQuestions = shuffledDatabase.slice(0, num);
            
            document.getElementById("start-area").classList.add("hidden");
            document.getElementById("header-area").classList.remove("hidden");
            
            currentIndex = 0;
            correctAnswersCount = 0;
            loadQuestion();
        }

        function loadQuestion() {
            let progress = (currentIndex / selectedQuestions.length) * 100;
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("question-counter").innerText = `السؤال ${currentIndex + 1} من ${selectedQuestions.length}`;

            if (currentIndex >= selectedQuestions.length) {
                showFinalScore();
                return;
            }

            const currentQ = selectedQuestions[currentIndex];
            const resultArea = document.getElementById("result-area");
            const questionArea = document.getElementById("question-area");

            resultArea.classList.add("hidden");
            questionArea.classList.remove("hidden");
            
            questionArea.classList.remove("fade-in-up");
            void questionArea.offsetWidth; 
            questionArea.classList.add("fade-in-up");

            document.getElementById("question").innerText = currentQ.q;
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = ""; 
            
            const finalDisplayOptions = currentQ.options;

            finalDisplayOptions.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "mcq-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedOption) {
            const currentQ = selectedQuestions[currentIndex];
            const isCorrect = selectedOption === currentQ.a;

            if (isCorrect) correctAnswersCount++;

            const questionArea = document.getElementById("question-area");
            const resultArea = document.getElementById("result-area");

            questionArea.classList.add("hidden");
            resultArea.classList.remove("hidden");
            
            resultArea.classList.remove("fade-in-up");
            void resultArea.offsetWidth;
            resultArea.classList.add("fade-in-up");

            const resultText = document.getElementById("result-text");
            if (isCorrect) {
                resultText.innerText = "صح! عبقري 🥳";
            } else {
                resultText.innerText = "غلط! ركز شوية ❌";
            }

            document.getElementById("correct-answer").innerHTML = `الإجابة هي:<br><strong>${currentQ.a}</strong>`;
        }

        function nextQuestion() {
            currentIndex++;
            loadQuestion();
        }

        function showFinalScore() {
            document.getElementById("header-area").classList.add("hidden");
            document.getElementById("question-area").classList.add("hidden");
            document.getElementById("result-area").classList.add("hidden");
            
            const finalArea = document.getElementById("final-area");
            finalArea.classList.remove("hidden");
            finalArea.classList.add("fade-in-up");

            const total = selectedQuestions.length;
            const percentage = (correctAnswersCount / total) * 100;
            
            document.getElementById("final-fraction").innerText = `${correctAnswersCount} / ${total}`;

            const certBox = document.getElementById("cert-box");
            const commentElement = document.getElementById("score-comment");
            const titleText = document.getElementById("cert-title-text");
            const stamp = document.getElementById("cert-stamp");

            certBox.classList.remove("passed", "failed");

            if (percentage >= 50) {
                certBox.classList.add("passed");
                titleText.innerText = "شهادة إتمام الهبد 📜";
                stamp.innerText = "ناجح";
                
                if (percentage >= 90) {
                    commentElement.innerText = "التقدير: امتياز.. عبقري في اللامعقول!";
                } else if (percentage >= 70) {
                    commentElement.innerText = "التقدير: جيد جداً.. ماشي حالك.";
                } else {
                    commentElement.innerText = "التقدير: مقبول.. نجاح بالعافية.";
                }
            } else {
                certBox.classList.add("failed");
                titleText.innerText = "إخطار رسوب (ملحق) 🚨";
                stamp.innerText = "ساقط";
                commentElement.innerText = "التقدير: ضعيف جداً.. نتقابل في الملحق الصيفي! 😭";
            }
        }
    </script>
</body>
</html>
